basePath: /api
definitions:
  model.AdminStats:
    properties:
      counts:
        $ref: '#/definitions/model.CountsData'
      hot_posts:
        items:
          $ref: '#/definitions/model.Post'
        type: array
      top_tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
      trends:
        $ref: '#/definitions/model.TrendsData'
    type: object
  model.AwardBadgeRequest:
    properties:
      badge_id:
        type: integer
      reason:
        type: string
      user_id:
        type: integer
    required:
    - badge_id
    - user_id
    type: object
  model.Badge:
    properties:
      contract_address:
        description: 可选：NFT 合约地址
        type: string
      created_at:
        type: string
      description:
        type: string
      icon_url:
        description: 勋章图标
        type: string
      id:
        type: integer
      metadata_url:
        description: 可选：NFT metadata URL
        type: string
      name:
        type: string
      token_id:
        description: 可选：NFT token ID
        type: string
      updated_at:
        type: string
    type: object
  model.BatchDeleteRequest:
    properties:
      ids:
        items:
          type: integer
        maxItems: 100
        minItems: 1
        type: array
    required:
    - ids
    type: object
  model.Category:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  model.Comment:
    properties:
      author_id:
        type: integer
      author_name:
        description: 冗余字段，减少查询
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_essence:
        description: 是否精华
        type: boolean
      is_pinned:
        description: 是否置顶
        type: boolean
      like_count:
        type: integer
      parent_id:
        description: 为空表示一级评论，否则为回复
        type: integer
      post_id:
        type: integer
      updated_at:
        type: string
    type: object
  model.CommentReport:
    properties:
      comment_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      reason:
        type: string
      status:
        $ref: '#/definitions/model.CommentReportStatus'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  model.CommentReportStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - CommentReportStatusPending
    - CommentReportStatusApproved
    - CommentReportStatusRejected
  model.CountsData:
    properties:
      badges:
        type: integer
      categories:
        type: integer
      comments:
        type: integer
      posts:
        type: integer
      tags:
        type: integer
      users:
        type: integer
    type: object
  model.CreateBadgeRequest:
    properties:
      contract_address:
        type: string
      description:
        type: string
      icon_url:
        type: string
      metadata_url:
        type: string
      name:
        type: string
      token_id:
        type: string
    required:
    - name
    type: object
  model.CreateCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  model.CreateCommentReportRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  model.CreateCommentRequest:
    properties:
      content:
        type: string
      parent_id:
        type: integer
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  model.CreatePostRequest:
    properties:
      category_id:
        type: integer
      content:
        type: string
      cover_url:
        type: string
      publish_at:
        description: 定时发布时间，status=scheduled 时必填
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.PostStatus'
        description: draft / published / scheduled，默认 published
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    required:
    - category_id
    - content
    - title
    type: object
  model.CreateTagRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  model.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  model.ListResponse:
    properties:
      data: {}
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.LoginResponse:
    properties:
      expire_at:
        type: integer
      token:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  model.Message:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      receiver_id:
        type: integer
      sender_id:
        type: integer
      updated_at:
        type: string
    type: object
  model.Post:
    properties:
      author:
        $ref: '#/definitions/model.User'
      author_id:
        type: integer
      category:
        $ref: '#/definitions/model.Category'
      category_id:
        type: integer
      content:
        type: string
      cover_url:
        type: string
      created_at:
        type: string
      id:
        type: integer
      like_count:
        type: integer
      publish_at:
        type: string
      status:
        $ref: '#/definitions/model.PostStatus'
      summary:
        type: string
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  model.PostStatus:
    enum:
    - draft
    - published
    - scheduled
    type: string
    x-enum-varnames:
    - PostStatusDraft
    - PostStatusPublished
    - PostStatusScheduled
  model.RegisterRequest:
    properties:
      email:
        type: string
      nickname:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  model.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  model.SendMessageRequest:
    properties:
      content:
        type: string
      receiver_id:
        type: integer
    required:
    - content
    - receiver_id
    type: object
  model.Tag:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.TokenResponse:
    properties:
      token:
        type: string
    type: object
  model.TrendData:
    properties:
      count:
        type: integer
      date:
        type: string
    type: object
  model.TrendsData:
    properties:
      comments:
        items:
          $ref: '#/definitions/model.TrendData'
        type: array
      posts:
        items:
          $ref: '#/definitions/model.TrendData'
        type: array
      users:
        items:
          $ref: '#/definitions/model.TrendData'
        type: array
    type: object
  model.UpdateBadgeRequest:
    properties:
      contract_address:
        type: string
      description:
        type: string
      icon_url:
        type: string
      metadata_url:
        type: string
      name:
        type: string
      token_id:
        type: string
    type: object
  model.UpdateCommentReportStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/model.CommentReportStatus'
        enum:
        - pending
        - approved
        - rejected
    required:
    - status
    type: object
  model.UpdateCommentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  model.UpdatePostRequest:
    properties:
      category_id:
        type: integer
      content:
        type: string
      cover_url:
        type: string
      publish_at:
        type: string
      status:
        $ref: '#/definitions/model.PostStatus'
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    type: object
  model.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      nickname:
        type: string
    type: object
  model.UpdateTagRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  model.UpdateUserRoleRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/model.UserRole'
        enum:
        - admin
        - user
    required:
    - role
    type: object
  model.UpdateUserStatusRequest:
    properties:
      is_active:
        type: boolean
    required:
    - is_active
    type: object
  model.User:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: integer
      is_active:
        type: boolean
      nickname:
        type: string
      role:
        $ref: '#/definitions/model.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  model.UserBadge:
    properties:
      badge:
        $ref: '#/definitions/model.Badge'
      badge_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      reason:
        description: 颁发原因
        type: string
      user_id:
        type: integer
    type: object
  model.UserRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - UserRoleAdmin
    - UserRoleUser
  model.VerifyEmailRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  utils.Response:
    properties:
      code:
        $ref: '#/definitions/utils.ResponseCode'
      data: {}
      message:
        type: string
    type: object
  utils.ResponseCode:
    enum:
    - 0
    - 400
    - 401
    - 403
    - 404
    - 429
    - 500
    - 1001
    type: integer
    x-enum-varnames:
    - CodeSuccess
    - CodeBadRequest
    - CodeUnauthorized
    - CodeForbidden
    - CodeNotFound
    - CodeTooManyRequests
    - CodeInternalError
    - CodeBusinessError
host: localhost:8080
info:
  contact:
    name: 博客作者
    url: http://localhost:8080
  description: 基于 Gin + GORM + MySQL + Redis 的个人博客后端 RESTful API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://localhost:8080
  title: 个人博客 API
  version: "1.0"
paths:
  /admin/comment-reports:
    get:
      parameters:
      - description: 状态：pending/approved/rejected
        in: query
        name: status
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 查询评论举报列表
      tags:
      - 评论举报
  /admin/comment-reports/{id}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: 举报 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 状态
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateCommentReportStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.CommentReport'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 审核评论举报
      tags:
      - 评论举报
  /admin/comments/{id}/essence:
    put:
      parameters:
      - description: 评论 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 是否精华
        in: query
        name: essence
        required: true
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Comment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 加精/取消加精评论
      tags:
      - 评论
  /admin/comments/{id}/pin:
    put:
      parameters:
      - description: 评论 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 是否置顶
        in: query
        name: pinned
        required: true
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Comment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 置顶/取消置顶评论
      tags:
      - 评论
  /admin/comments/batch-delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: 评论 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.BatchDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 批量删除评论
      tags:
      - 评论
  /admin/posts/batch-delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: 文章 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.BatchDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 批量删除文章
      tags:
      - 管理后台
  /admin/users/batch-delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: 用户 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.BatchDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理员批量删除用户
      tags:
      - 认证
  /api/audit-logs:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 动作，如 CREATE/UPDATE/DELETE
        in: query
        name: action
        type: string
      - description: 资源，如 post/user/category
        in: query
        name: resource
        type: string
      - description: 操作人用户 ID
        in: query
        name: user_id
        type: integer
      - description: 开始时间，RFC3339 或 2006-01-02
        in: query
        name: start_time
        type: string
      - description: 结束时间，RFC3339 或 2006-01-02
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: 查询审计日志
      tags:
      - 管理后台
  /audit-logs/export:
    get:
      parameters:
      - description: 动作
        in: query
        name: action
        type: string
      - description: 资源
        in: query
        name: resource
        type: string
      - description: 用户 ID
        in: query
        name: user_id
        type: integer
      - description: 开始时间
        in: query
        name: start_time
        type: string
      - description: 结束时间
        in: query
        name: end_time
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: CSV 文件
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 导出审计日志 CSV
      tags:
      - 管理后台
  /auth/badges:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.UserBadge'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取当前登录用户的勋章列表
      tags:
      - 勋章
  /auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: 原密码与新密码
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 修改当前登录用户密码
      tags:
      - 认证
  /auth/favorites:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 我的收藏
      tags:
      - 文章
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: 邮箱
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 忘记密码
      tags:
      - 认证
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录凭证
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "1001":
          description: ""
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
